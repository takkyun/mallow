name: Release

# Build cross-platform bundles and attach them to a GitHub release.
#
# Trigger by pushing a version tag (e.g. `v0.1.0`), or run manually from the
# Actions tab with an explicit tag. The release is created as a DRAFT with notes
# generated from the pull requests merged since the previous tag (grouped per
# .github/release.yml) — review the assets and notes, then publish it by hand.
#
# `create-release` makes the draft once; the `build` matrix then uploads each
# platform's bundle to it by release id (so the matrix jobs never race to create
# the release). macOS builds are signed with a Developer ID Application
# certificate and notarized when the APPLE_* secrets are configured (see
# scripts/setup-ci-signing-secrets.sh). Windows and Linux bundles are unsigned.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.1.0). A draft release with this tag is created.'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # On a manual run, fail early with a clear message if the requested tag
      # does not exist yet (auto-generated notes are computed against the tag).
      - name: Verify the release tag exists (manual runs)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if ! gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' does not exist. Create and push it first: git tag $TAG && git push origin $TAG" >&2
            exit 1
          fi

      - name: Create (or reuse) the draft release with generated notes
        id: release
        run: |
          set -eu
          # Reuse an existing release for this tag if present (e.g. on re-run).
          # The tags endpoint can't see drafts, so list releases and match on
          # tag_name instead.
          id=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq "[.[] | select(.tag_name == \"$RELEASE_TAG\")][0].id // empty")
          if [ -z "$id" ]; then
            id=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
              -f tag_name="$RELEASE_TAG" \
              -f name="mallow $RELEASE_TAG" \
              -F draft=true \
              -F prerelease=false \
              -F generate_release_notes=true \
              --jq .id)
            echo "Created draft release $id for $RELEASE_TAG"
          else
            echo "Reusing existing release $id for $RELEASE_TAG"
          fi
          echo "release_id=$id" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon runner; `universal-apple-darwin` lipo-merges an Intel
          # slice too, so one .dmg covers both architectures.
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: --target universal-apple-darwin
          # 22.04 keeps the produced AppImage runnable on older glibc than 24.04.
          - platform: ubuntu-22.04
            rust_targets: ''
            tauri_args: ''
          - platform: windows-latest
            rust_targets: ''
            tauri_args: ''
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      # Build from the release tag itself, so a manual run can never bundle a
      # different commit than the tag names. On a tag push github.ref is already
      # refs/tags/<tag>, so this is equivalent to the default there.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build, sign, and upload to the draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization. Empty/unset on non-macOS runners and
          # until the secrets are configured, in which case macOS builds are
          # produced unsigned and the notarize step below fails fast.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Upload to the draft create-release made; do not create/edit it here,
          # so its generated notes are preserved.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.tauri_args }}

      # Tauri notarizes the .app but not the .dmg that wraps it, so the disk
      # image is rejected by Gatekeeper on open. Notarize + staple the .dmg,
      # then replace the asset tauri-action already uploaded. Mirrors the local
      # scripts/macos-sign-build.sh workaround.
      - name: Notarize and staple the macOS .dmg
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          shopt -s nullglob
          dmgs=(src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
          if [ ${#dmgs[@]} -eq 0 ]; then
            echo "::error::No .dmg found to notarize." >&2
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            echo "Notarizing $dmg"
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
            gh release upload "$RELEASE_TAG" "$dmg" --clobber -R "$GITHUB_REPOSITORY"
          done
